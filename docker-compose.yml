services:
  nginx:
    image: nginx:1.21.1
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./src:/var/www/
    depends_on:
      - php

  php:
    build: ./docker/php
    container_name: flea-market-php
    volumes:
      - ./src:/var/www/

  mysql:
    image: mysql:8.0.26
    platform: linux/x86_64
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: flea_market_db
      MYSQL_USER: flea_market_user
      MYSQL_PASSWORD: flea_market_pass
    command:
      mysqld
      --default-authentication-plugin=mysql_native_password
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: flea-market-pma
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=mysql
      - PMA_USER=flea_market_user
      - PMA_PASSWORD=flea_market_pass
    depends_on:
      - mysql
    ports:
      - 8080:80
